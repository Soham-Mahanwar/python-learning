<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Options Terminal — Profile</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700;800&family=Syne:wght@700;800&family=Inter:wght@400;500;600;700&display=swap');

:root {
  --bg:#080b12; --bg2:#0e1420; --bg3:#141c2e; --bg4:#1a2238;
  --bdr:rgba(255,255,255,.07);
  --orange:#ff6b00; --or-l:#ff8c33; --or-d:#c85300;
  --or-bg:rgba(255,107,0,.08); --or-glow:rgba(255,107,0,.25);
  --white:#e8ecf2; --sub:#8796a5; --dim:#4a5568;
  --grn:#00d166; --grn-bg:rgba(0,209,102,.08); --grn-bdr:rgba(0,209,102,.25);
  --red:#ff4757; --red-bg:rgba(255,71,87,.08); --red-bdr:rgba(255,71,87,.25);
  --blue:#4da6ff; --blue-bg:rgba(77,166,255,.08);
  --gld:#f5c842;
  --mono:'JetBrains Mono',monospace;
  --head:'Syne',sans-serif;
  --body:'Inter',sans-serif;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{
  background:var(--bg); color:var(--white); font-family:var(--body);
  min-height:100vh; display:flex; flex-direction:column;
  align-items:center; overflow-x:hidden;
}
input,button{font-family:var(--body);}
a{text-decoration:none; color:inherit;}

/* ── BG ── */
.bg-layer{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
.bg-layer::before{
  content:''; position:absolute; inset:0;
  background-image:
    linear-gradient(rgba(255,107,0,.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,107,0,.03) 1px, transparent 1px);
  background-size:52px 52px; animation:gMove 30s linear infinite;
}
@keyframes gMove{0%{transform:translate(0,0)}100%{transform:translate(52px,52px)}}
.orb{position:absolute; border-radius:50%; filter:blur(110px);}
.o1{width:560px;height:560px;background:rgba(255,107,0,.07);top:-230px;left:-160px;animation:oF 17s ease-in-out infinite;}
.o2{width:430px;height:430px;background:rgba(77,166,255,.05);bottom:-170px;right:-120px;animation:oF 20s ease-in-out infinite;animation-delay:-8s;}
@keyframes oF{0%,100%{transform:translate(0,0) scale(1)}40%{transform:translate(20px,-15px) scale(1.04)}70%{transform:translate(-14px,20px) scale(.97)}}

/* ── Topbar ── */
.topbar{
  position:sticky; top:0; z-index:200; width:100%;
  background:rgba(8,11,18,.9); backdrop-filter:blur(16px);
  border-bottom:1px solid var(--bdr);
  display:flex; align-items:center; padding:0 28px; height:52px; gap:12px; flex-shrink:0;
}
.tb-logo{display:flex;align-items:center;gap:10px;}
.tb-icon{
  width:30px;height:30px;
  background:linear-gradient(135deg,var(--orange),var(--or-d));
  border-radius:7px; display:flex; align-items:center; justify-content:center;
  font-size:14px; box-shadow:0 0 14px var(--or-glow);
}
.tb-name{font-family:var(--head);font-size:16px;font-weight:800;letter-spacing:-.2px;}
.tb-name span{color:var(--orange);}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:12px;}
.tb-link{
  font-size:11px; color:var(--sub); cursor:pointer;
  padding:4px 8px; border-radius:6px; border:1px solid var(--bdr);
  transition:all .2s; display:flex; align-items:center; gap:5px;
}
.tb-link:hover{border-color:var(--orange);color:var(--orange);}

/* ── Page content ── */
.page{
  position:relative; z-index:10;
  width:100%; max-width:600px;
  padding:44px 24px 60px;
}

/* ── Header ── */
.hdr{text-align:center; margin-bottom:44px; animation:fadeUp .5s ease both;}
.hdr-pill{
  display:inline-flex; align-items:center; gap:7px;
  font-size:10px; font-family:var(--mono);
  font-weight:700; letter-spacing:.12em; text-transform:uppercase;
  color:var(--blue); background:var(--blue-bg);
  border:1px solid rgba(77,166,255,.2);
  padding:4px 13px; border-radius:20px; margin-bottom:14px;
}
.hdr h1{
  font-family:var(--head); font-size:34px; font-weight:800;
  letter-spacing:-.7px; line-height:1.1; margin-bottom:10px;
}
.hdr h1 em{color:var(--blue); font-style:normal;}
.hdr p{font-size:13px; color:var(--sub); line-height:1.65;}

/* ── Profile Card ── */
.profile-card{
  background:var(--bg2); border:1.5px solid var(--bdr);
  border-radius:16px; padding:32px;
  position:relative; overflow:hidden;
  box-shadow:0 8px 32px rgba(0,0,0,.3);
  animation:fadeUp .6s ease both;
}
.profile-card::before{
  content:''; position:absolute; top:0;left:0;right:0; height:2px;
  background:linear-gradient(90deg,transparent,var(--blue),transparent);
  opacity:.8;
}

.pc-row{
  display:flex; justify-content:space-between; align-items:center;
  padding:16px 0; border-bottom:1px solid var(--bdr);
}
.pc-row:last-child{border-bottom:none; padding-bottom:0;}
.pc-row:first-child{padding-top:0;}

.pc-label{
  font-size:11px; font-family:var(--mono); font-weight:700;
  letter-spacing:.08em; text-transform:uppercase; color:var(--sub);
}
.pc-value{
  font-size:15px; font-weight:600; color:var(--white);
}
.pc-value.mono{font-family:var(--mono); font-size:13px;}
.pc-value.grn{color:var(--grn);}
.pc-value.red{color:var(--red);}

.btn-row{
  display:flex; gap:12px; margin-top:32px;
}
.btn{
  flex:1; padding:12px 20px; border:none; border-radius:9px;
  font-size:13px; font-weight:700; cursor:pointer;
  transition:all .2s; display:flex; align-items:center; justify-content:center; gap:8px;
  font-family:var(--body);
}
.btn-ghost{
  background:transparent; border:1.5px solid var(--bdr); color:var(--sub);
}
.btn-ghost:hover{border-color:var(--blue);color:var(--blue);}
.btn-danger{
  background:transparent; border:1.5px solid var(--red-bdr); color:var(--red);
}
.btn-danger:hover{background:var(--red-bg);}

@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<div class="bg-layer">
  <div class="orb o1"></div>
  <div class="orb o2"></div>
</div>

<div class="topbar">
  <div class="tb-logo">
    <div class="tb-icon">⚡</div>
    <div class="tb-name">Options <span>Terminal</span></div>
  </div>
  <div class="tb-right">
    <a class="tb-link" href="index.html">🏠 Home</a>
    <a class="tb-link" onclick="clearAndLogin()">🗑 Logout</a>
  </div>
</div>

<div class="page">
  <div class="hdr">
    <div class="hdr-pill">User Account</div>
    <h1>Your <em>Profile</em></h1>
    <p>Manage your Zerodha connection and API credentials.</p>
  </div>

  <div class="profile-card">
    <div class="pc-row">
      <div class="pc-label">Name</div>
      <div class="pc-value" id="profName">—</div>
    </div>
    <div class="pc-row">
      <div class="pc-label">User ID</div>
      <div class="pc-value mono" id="profId">—</div>
    </div>
    <div class="pc-row">
      <div class="pc-label">API Key</div>
      <div class="pc-value mono" id="profKey">—</div>
    </div>
    <div class="pc-row">
      <div class="pc-label">Access Token</div>
      <div class="pc-value mono" id="profToken">—</div>
    </div>
    <div class="pc-row">
      <div class="pc-label">Token Status</div>
      <div class="pc-value" id="profStatus">—</div>
    </div>

    <div class="btn-row">
      <button class="btn btn-ghost" onclick="window.location.href='login.html'">🔑 Re-login / Change Token</button>
      <button class="btn btn-danger" onclick="clearAndLogin()">🗑 Logout &amp; Clear Data</button>
    </div>
  </div>
</div>

<script>
window.addEventListener('DOMContentLoaded', () => {
  const name = localStorage.getItem('ot_user_name') || 'Unknown User';
  const uid = localStorage.getItem('ot_user_id') || '—';
  const key = localStorage.getItem('ot_api_key') || '';
  const token = localStorage.getItem('ot_access_token') || '';

  document.getElementById('profName').textContent = name;
  document.getElementById('profId').textContent = uid;
  
  const maskedKey = key ? key.slice(0,6) + '...' + key.slice(-4) : 'Not Set';
  document.getElementById('profKey').textContent = maskedKey;

  const maskedToken = token ? token.slice(0,8) + '...' + token.slice(-4) : 'Not Set';
  document.getElementById('profToken').textContent = maskedToken;

  const statusEl = document.getElementById('profStatus');
  if (token) {
    statusEl.textContent = 'Active (Valid till midnight)';
    statusEl.className = 'pc-value grn';
  } else {
    statusEl.textContent = 'Missing or Expired';
    statusEl.className = 'pc-value red';
  }
});

function clearAndLogin() {
  if (!confirm('Clear all saved credentials and log out?')) return;
  const keys = ['ot_api_key', 'ot_api_secret', 'ot_access_token', 'ot_selected_index', 'ot_user_name', 'ot_user_id'];
  keys.forEach(k => localStorage.removeItem(k));
  window.location.href = 'login.html';
}
</script>
</body>
</html>
